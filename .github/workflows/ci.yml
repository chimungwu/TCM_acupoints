name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 移除 cache: 'npm' 這一行，這樣就不會強制檢查 package-lock.json

      - name: Install dependencies
        run: npm install # 改用 npm install，它會自動產生或更新依賴
        
      - name: Build
        run: npm run build
